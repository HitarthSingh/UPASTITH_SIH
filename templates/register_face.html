<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Registration - Attendance System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-blue: #02020a;
            --light-purple: #D8CCF2;
            --accent-purple-1: #8686AC;
            --accent-purple-2: #505081;
            --accent-purple-3: #272757;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-blue);
            color: var(--light-purple);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, var(--accent-purple-2), transparent 40%),
                radial-gradient(circle at 85% 30%, var(--accent-purple-3), transparent 40%),
                radial-gradient(circle at 50% 90%, var(--accent-purple-1), transparent 40%);
            filter: blur(120px);
            animation: subtleAurora 20s ease-in-out infinite alternate;
        }

        @keyframes subtleAurora {
            from {
                transform: scale(1) rotate(0deg);
                opacity: 0.7;
            }
            to {
                transform: scale(1.1) rotate(15deg);
                opacity: 0.9;
            }
        }

        .glass-card {
            background: rgba(39, 39, 87, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(134, 134, 172, 0.2);
        }

        #video-preview {
            transform: scaleX(-1); /* Mirror effect for natural selfie view */
        }

        .capture-button {
            background: linear-gradient(135deg, var(--accent-purple-1), var(--light-purple));
            transition: all 0.3s ease;
        }

        .capture-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(134, 134, 172, 0.3);
        }

        .status-success {
            color: #22c55e;
            background-color: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
        }

        .status-error {
            color: #ef4444;
            background-color: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .status-info {
            color: #60a5fa;
            background-color: rgba(96, 165, 250, 0.1);
            border-color: rgba(96, 165, 250, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass-card rounded-3xl shadow-2xl w-full max-w-md p-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-br from-purple-400 to-blue-500 rounded-full mx-auto mb-4 flex items-center justify-center">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Face Registration</h1>
            <p class="text-white/70">Register your face for attendance marking</p>
        </div>

        <!-- Registration Form -->
        <form id="registration-form" class="space-y-6">
            <!-- Name Input -->
            <div>
                <label for="student-name" class="block text-sm font-medium text-white/90 mb-2">Full Name</label>
                <input 
                    type="text" 
                    id="student-name" 
                    name="name"
                    class="w-full px-4 py-3 bg-black/20 border border-white/20 rounded-lg text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent"
                    placeholder="Enter your full name"
                    required
                >
            </div>

            <!-- Email Input (Optional) -->
            <div>
                <label for="student-email" class="block text-sm font-medium text-white/90 mb-2">Email (Optional)</label>
                <input 
                    type="email" 
                    id="student-email" 
                    name="email"
                    class="w-full px-4 py-3 bg-black/20 border border-white/20 rounded-lg text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent"
                    placeholder="Enter your email address"
                >
            </div>

            <!-- Camera Section -->
            <div class="space-y-4">
                <label class="block text-sm font-medium text-white/90">Face Photo</label>
                
                <!-- Video Preview -->
                <div class="relative">
                    <video 
                        id="video-preview" 
                        class="w-full rounded-lg bg-black/30" 
                        autoplay 
                        playsinline
                        style="display: none;"
                    ></video>
                    
                    <!-- Canvas for captured image -->
                    <canvas id="capture-canvas" class="w-full rounded-lg" style="display: none;"></canvas>
                    
                    <!-- Placeholder when camera is not active -->
                    <div id="camera-placeholder" class="w-full h-64 bg-black/30 rounded-lg flex items-center justify-center border-2 border-dashed border-white/20">
                        <div class="text-center">
                            <svg class="w-12 h-12 text-white/50 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            </svg>
                            <p class="text-white/70 text-sm">Camera preview will appear here</p>
                        </div>
                    </div>
                </div>

                <!-- Camera Controls -->
                <div class="flex gap-3">
                    <button 
                        type="button" 
                        id="start-camera-btn" 
                        class="flex-1 px-4 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors flex items-center justify-center gap-2"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                        </svg>
                        Start Camera
                    </button>
                    
                    <button 
                        type="button" 
                        id="capture-btn" 
                        class="flex-1 px-4 py-3 capture-button text-black rounded-lg font-medium flex items-center justify-center gap-2"
                        style="display: none;"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                        </svg>
                        Capture Photo
                    </button>
                    
                    <button 
                        type="button" 
                        id="retake-btn" 
                        class="flex-1 px-4 py-3 bg-gray-600 hover:bg-gray-700 text-white rounded-lg font-medium flex items-center justify-center gap-2"
                        style="display: none;"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                        Retake
                    </button>
                </div>
            </div>

            <!-- Status Message -->
            <div id="status-message" class="p-4 rounded-lg border hidden">
                <p id="status-text" class="text-sm font-medium"></p>
            </div>

            <!-- Submit Button -->
            <button 
                type="submit" 
                id="register-btn"
                class="w-full px-6 py-4 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 text-white rounded-lg font-semibold text-lg transition-all duration-300 transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"
                disabled
            >
                Register Face
            </button>
        </form>

        <!-- Back to Dashboard Link -->
        <div class="mt-6 text-center">
            <a href="/" class="text-purple-400 hover:text-purple-300 text-sm font-medium transition-colors">
                ← Back to Dashboard
            </a>
        </div>
    </div>

    <script>
        let videoStream = null;
        let capturedImageData = null;

        // DOM Elements
        const form = document.getElementById('registration-form');
        const nameInput = document.getElementById('student-name');
        const emailInput = document.getElementById('student-email');
        const videoPreview = document.getElementById('video-preview');
        const captureCanvas = document.getElementById('capture-canvas');
        const cameraPlaceholder = document.getElementById('camera-placeholder');
        const startCameraBtn = document.getElementById('start-camera-btn');
        const captureBtn = document.getElementById('capture-btn');
        const retakeBtn = document.getElementById('retake-btn');
        const registerBtn = document.getElementById('register-btn');
        const statusMessage = document.getElementById('status-message');
        const statusText = document.getElementById('status-text');

        // Show status message
        function showStatus(message, type = 'info') {
            statusText.textContent = message;
            statusMessage.className = `p-4 rounded-lg border status-${type}`;
            statusMessage.classList.remove('hidden');
        }

        // Hide status message
        function hideStatus() {
            statusMessage.classList.add('hidden');
        }

        // Start camera
        async function startCamera() {
            try {
                hideStatus();
                showStatus('Starting camera...', 'info');
                
                videoStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });

                videoPreview.srcObject = videoStream;
                
                // Show video, hide placeholder
                cameraPlaceholder.style.display = 'none';
                videoPreview.style.display = 'block';
                
                // Update button states
                startCameraBtn.style.display = 'none';
                captureBtn.style.display = 'flex';
                
                showStatus('Camera ready! Position your face in the frame and click capture.', 'success');
                
            } catch (error) {
                console.error('Error accessing camera:', error);
                showStatus('Error accessing camera. Please check permissions and try again.', 'error');
            }
        }

        // Capture photo
        function capturePhoto() {
            if (!videoStream) return;

            const canvas = captureCanvas;
            const video = videoPreview;
            const ctx = canvas.getContext('2d');

            // Set canvas dimensions
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            // Draw video frame to canvas (flip horizontally for natural selfie view)
            ctx.scale(-1, 1);
            ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
            ctx.scale(-1, 1);

            // Convert to base64
            capturedImageData = canvas.toDataURL('image/jpeg', 0.8);

            // Show captured image
            videoPreview.style.display = 'none';
            canvas.style.display = 'block';

            // Update button states
            captureBtn.style.display = 'none';
            retakeBtn.style.display = 'flex';
            
            // Enable register button if name is filled
            updateRegisterButton();
            
            showStatus('Photo captured! You can now register your face.', 'success');
        }

        // Retake photo
        function retakePhoto() {
            capturedImageData = null;
            
            // Show video preview again
            captureCanvas.style.display = 'none';
            videoPreview.style.display = 'block';
            
            // Update button states
            retakeBtn.style.display = 'none';
            captureBtn.style.display = 'flex';
            
            // Disable register button
            updateRegisterButton();
            
            showStatus('Camera ready! Position your face and click capture.', 'info');
        }

        // Update register button state
        function updateRegisterButton() {
            const hasName = nameInput.value.trim().length > 0;
            const hasPhoto = capturedImageData !== null;
            
            registerBtn.disabled = !(hasName && hasPhoto);
        }

        // Stop camera
        function stopCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
        }

        // Register face
        async function registerFace(event) {
            event.preventDefault();
            
            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            
            if (!name || !capturedImageData) {
                showStatus('Please enter your name and capture a photo.', 'error');
                return;
            }

            try {
                registerBtn.disabled = true;
                registerBtn.textContent = 'Registering...';
                showStatus('Registering your face...', 'info');

                const response = await fetch('/api/registerfinal1', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: name,
                        email: email || null,
                        image: capturedImageData.split(',')[1] // Remove data:image/jpeg;base64, prefix
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showStatus(`✅ Face registered successfully for ${name}!`, 'success');
                    
                    // Reset form after successful registration
                    setTimeout(() => {
                        form.reset();
                        capturedImageData = null;
                        stopCamera();
                        
                        // Reset UI
                        videoPreview.style.display = 'none';
                        captureCanvas.style.display = 'none';
                        cameraPlaceholder.style.display = 'flex';
                        
                        startCameraBtn.style.display = 'flex';
                        captureBtn.style.display = 'none';
                        retakeBtn.style.display = 'none';
                        
                        registerBtn.disabled = true;
                        registerBtn.textContent = 'Register Face';
                        
                        hideStatus();
                    }, 3000);
                    
                } else {
                    showStatus(`❌ Registration failed: ${result.message}`, 'error');
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Register Face';
                }

            } catch (error) {
                console.error('Registration error:', error);
                showStatus('❌ Network error. Please try again.', 'error');
                registerBtn.disabled = false;
                registerBtn.textContent = 'Register Face';
            }
        }

        // Event Listeners
        startCameraBtn.addEventListener('click', startCamera);
        captureBtn.addEventListener('click', capturePhoto);
        retakeBtn.addEventListener('click', retakePhoto);
        nameInput.addEventListener('input', updateRegisterButton);
        form.addEventListener('submit', registerFace);

        // Cleanup on page unload
        window.addEventListener('beforeunload', stopCamera);
    </script>
</body>
</html>
