<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Application</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Theme Colors */
            --dark-blue: #02020a;
            --light-purple: #D8CCF2;
            --accent-purple-1: #8686AC;
            --accent-purple-2: #505081;
            --accent-purple-3: #272757;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-blue);
            color: var(--light-purple);
            overflow-x: hidden;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, var(--accent-purple-2), transparent 40%),
                radial-gradient(circle at 85% 30%, var(--accent-purple-3), transparent 40%),
                radial-gradient(circle at 50% 90%, var(--accent-purple-1), transparent 40%);
            filter: blur(120px);
            animation: subtleAurora 20s ease-in-out infinite alternate;
        }
        @keyframes subtleAurora {
            from { transform: scale(1) rotate(0deg); opacity: 0.7; }
            to { transform: scale(1.1) rotate(15deg); opacity: 0.9; }
        }

        /* Glass card effect helper */
        .glass-card {
            background: rgba(39, 39, 87, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(134, 134, 172, 0.2);
        }

        /* Custom button style helper */
        .btn-custom {
            background-color: var(--accent-purple-1);
            color: var(--dark-blue);
            box-shadow: 0 4px 15px -5px rgba(134, 134, 172, 0.4);
            transition: all 0.2s ease-in-out;
        }
        .btn-custom:hover {
            box-shadow: 0 6px 20px -5px rgba(134, 134, 172, 0.6);
            transform: translateY(-2px);
        }
        .btn-custom:active {
            transform: scale(0.95);
        }

        /* Custom input for dark theme */
        .input-custom {
            background-color: rgba(2, 2, 10, 0.5);
            border: 1px solid rgba(134, 134, 172, 0.2);
        }
        .input-custom:focus {
            border-color: var(--accent-purple-1);
            outline: none;
            box-shadow: none;
        }

        /* Custom styling for file input button */
        input[type="file"]::file-selector-button {
            background-color: var(--accent-purple-1);
            color: var(--dark-blue);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }
        input[type="file"]::file-selector-button:hover {
            background-color: var(--light-purple);
        }
         /* Sidebar Styles */
        #sidebar {
            transition: width 0.3s ease-in-out;
        }
        #main-content {
            transition: margin-left 0.3s ease-in-out;
        }
        
        #sidebar.collapsed {
            width: 88px; /* w-22 */
        }
        #sidebar.collapsed .nav-text, #sidebar.collapsed #sidebar-header h1 {
            opacity: 0;
            visibility: hidden;
            width: 0;
            transition: opacity 0.1s, width 0.3s;
        }
        #sidebar.collapsed .nav-link svg {
            margin-right: 0;
        }
        #main-content.sidebar-collapsed {
            margin-left: 88px;
        }
        .nav-text, #sidebar-header h1 {
            transition: opacity 0.2s ease-in-out 0.1s, width 0.3s;
        }

         /* Mobile slide-in */
        @media (max-width: 1023px) {
            #sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease-in-out;
                z-index: 60;
                width: 256px !important; /* w-64 */
            }
            #sidebar.open {
                transform: translateX(0);
            }
             #main-content {
                margin-left: 0 !important;
            }
        }
    </style>
</head>
<body class="bg-[var(--dark-blue)]">
    <div class="relative min-h-screen flex">
        <!-- Collapsible Sidebar -->
        <aside id="sidebar" class="glass-card fixed top-0 left-0 h-full w-64 p-6 flex flex-col z-50">
            <!-- Desktop Collapse Button -->
            <button id="desktop-sidebar-toggle" class="hidden lg:flex absolute top-1/2 -right-4 transform -translate-y-1/2 w-8 h-8 rounded-full bg-[var(--accent-purple-2)] items-center justify-center text-white hover:bg-[var(--accent-purple-1)] transition-all z-10">
                <svg id="desktop-toggle-icon" class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div id="sidebar-header" class="mb-10 mt-4 overflow-hidden">
                <h1 class="text-2xl font-bold text-white text-center whitespace-nowrap">Student Portal</h1>
            </div>
            <nav class="w-full flex-grow">
                <ul class="space-y-2">
                    <li><a href="studentdashboard.html" class="nav-link flex items-center p-3 rounded-lg text-white/70 hover:bg-white/10 transition-colors"><svg class="w-5 h-5 mr-3 transition-all flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h4"></path></svg><span class="nav-text whitespace-nowrap">Home</span></a></li>
                    <li><a href="timetable.html" class="nav-link flex items-center p-3 rounded-lg text-white/70 hover:bg-white/10 transition-colors"><svg class="w-5 h-5 mr-3 transition-all flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg><span class="nav-text whitespace-nowrap">Timetable</span></a></li>
                    <li><a href="repository.html" class="nav-link flex items-center p-3 rounded-lg text-white/70 hover:bg-white/10 transition-colors"><svg class="w-5 h-5 mr-3 transition-all flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v2a2 2 0 01-2 2m2-4v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4a2 2 0 012-2m2 4h10m-10 0v-2a2 2 0 012-2h6a2 2 0 012 2v2m-6-4h4"></path></svg><span class="nav-text whitespace-nowrap">Repository</span></a></li>
                    <li><a href="leaveapplication.html" class="nav-link flex items-center p-3 rounded-lg text-white font-semibold bg-white/20 shadow-md"><svg class="w-5 h-5 mr-3 transition-all flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span class="nav-text whitespace-nowrap">Leave Application</span></a></li>
                    <li><a href="studentresult.html" class="nav-link flex items-center p-3 rounded-lg text-white/70 hover:bg-white/10 transition-colors"><svg class="w-5 h-5 mr-3 transition-all flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg><span class="nav-text whitespace-nowrap">Student Result</span></a></li>
                    <li><a href="suggestionbox.html" class="nav-link flex items-center p-3 rounded-lg text-white/70 hover:bg-white/10 transition-colors"><svg class="w-5 h-5 mr-3 transition-all flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 20.25h4.5m-15-2.25h15M12 16.5h4.5M3 13.5h18M12 9.75h4.5M3 6.75h18"></path></svg><span class="nav-text whitespace-nowrap">Suggestion Box</span></a></li>
                </ul>
            </nav>
        </aside>
        
        <!-- Mobile Sidebar Toggle Button -->
        <button id="sidebar-toggle" class="lg:hidden fixed top-4 left-4 z-50 p-2 rounded-md glass-card text-white">
             <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
        </button>

        <!-- Main Content Area -->
        <div id="main-content" class="flex-grow lg:ml-64">
             <main class="flex-grow p-4 lg:p-8">
                <div class="w-full max-w-4xl mx-auto">
                    <!-- Header Section -->
                    <div class="glass-card rounded-3xl shadow-xl p-6 md:p-8 mb-8 flex flex-col md:flex-row justify-between items-start">
                        <div>
                            <h1 class="text-3xl lg:text-5xl font-bold text-white">Leave Application</h1>
                            <p class="text-xl lg:text-2xl mt-2 font-medium text-white/70">Submit your leave request.</p>
                        </div>
                        <div class="flex items-center space-x-4 mt-4 md:mt-0">
                             <div class="text-right">
                                <h3 id="student-name" class="font-medium text-lg text-white"></h3>
                                <p id="student-id" class="text-sm text-white/70"></p>
                            </div>
                            <div class="w-14 h-14 bg-[var(--accent-purple-1)] rounded-full flex items-center justify-center shadow-inner">
                                <span id="student-initial" class="text-2xl font-bold text-[var(--dark-blue)]"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Leave Application Form -->
                    <div class="glass-card rounded-3xl shadow-xl p-8">
                        <form id="leave-application-form">
                            <div class="mb-6">
                                <label for="reason" class="block text-lg font-medium text-white/80 mb-2">Reason for Leave</label>
                                <textarea id="reason" name="reason" rows="4" class="w-full p-4 rounded-lg input-custom transition-all text-white" required></textarea>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                <div>
                                    <label for="start-date" class="block text-lg font-medium text-white/80 mb-2">Start Date</label>
                                    <input type="date" id="start-date" name="start-date" class="w-full p-4 rounded-lg input-custom transition-all text-white/70" style="color-scheme: dark;" required>
                                </div>
                                <div>
                                    <label for="end-date" class="block text-lg font-medium text-white/80 mb-2">End Date</label>
                                    <input type="date" id="end-date" name="end-date" class="w-full p-4 rounded-lg input-custom transition-all text-white/70" style="color-scheme: dark;" required>
                                </div>
                            </div>

                            <div class="mb-6">
                                <label for="attachments" class="block text-lg font-medium text-white/80 mb-2">Attach Documents (Optional)</label>
                                <input type="file" id="attachments" name="attachments" multiple class="w-full p-2 rounded-lg input-custom transition-all text-white/70 cursor-pointer">
                            </div>

                            <div class="text-center mt-8">
                                <button type="submit" id="submit-btn" class="w-full sm:w-auto btn-custom font-medium px-8 py-3 rounded-full">
                                    Submit Application
                                </button>
                            </div>
                        </form>
                        
                        <!-- Success/Error Message -->
                        <div id="form-message" class="mt-4 p-3 rounded-lg hidden">
                            <p id="form-message-text" class="text-center font-medium"></p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
     <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- 0. NAVIGATION TOGGLE ---
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const mobileSidebarToggle = document.getElementById('sidebar-toggle');
            const desktopSidebarToggle = document.getElementById('desktop-sidebar-toggle');
            const desktopToggleIcon = document.getElementById('desktop-toggle-icon');
            
            mobileSidebarToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                sidebar.classList.toggle('open');
            });
            
            if (desktopSidebarToggle) {
                desktopSidebarToggle.addEventListener('click', () => {
                    sidebar.classList.toggle('collapsed');
                    mainContent.classList.toggle('sidebar-collapsed');
                    desktopToggleIcon.classList.toggle('rotate-180');
                });
            }

            document.addEventListener('click', (e) => {
                if (window.innerWidth < 1023 && sidebar.classList.contains('open')) {
                    if (!sidebar.contains(e.target) && e.target !== mobileSidebarToggle) {
                        sidebar.classList.remove('open');
                    }
                }
            });

            // --- 1. MOCK DATA & INITIAL SETUP ---
            const studentData = {
                name: "Alex Williams",
                id: "67890",
                initial: "A"
            };

            function populateStudentInfo() {
                document.getElementById('student-name').textContent = studentData.name;
                document.getElementById('student-id').textContent = `ID: ${studentData.id}`;
                document.getElementById('student-initial').textContent = studentData.initial;
            }

            // --- 2. LEAVE APPLICATION FORM SUBMISSION ---
            const leaveForm = document.getElementById('leave-application-form');
            const submitBtn = document.getElementById('submit-btn');
            const formMessage = document.getElementById('form-message');
            const formMessageText = document.getElementById('form-message-text');

            function showMessage(message, isSuccess = true) {
                formMessage.className = `mt-4 p-3 rounded-lg ${isSuccess ? 'bg-green-500/20 border border-green-500/30' : 'bg-red-500/20 border border-red-500/30'}`;
                formMessageText.className = `text-center font-medium ${isSuccess ? 'text-green-400' : 'text-red-400'}`;
                formMessageText.textContent = message;
                formMessage.classList.remove('hidden');
                
                // Auto-hide after 5 seconds
                setTimeout(() => {
                    formMessage.classList.add('hidden');
                }, 5000);
            }

            leaveForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const formData = new FormData();
                formData.append('reason', document.getElementById('reason').value);
                formData.append('start_date', document.getElementById('start-date').value);
                formData.append('end_date', document.getElementById('end-date').value);
                
                // Add file attachments if any
                const attachments = document.getElementById('attachments').files;
                for (let i = 0; i < attachments.length; i++) {
                    formData.append('attachments', attachments[i]);
                }
                
                // Disable submit button during submission
                submitBtn.disabled = true;
                submitBtn.textContent = 'Submitting...';
                
                try {
                    const response = await fetch('/api/leave/submit', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await response.json();
                    
                    if (response.ok && result.success) {
                        showMessage('Leave application submitted successfully! It will be reviewed by your teacher.', true);
                        leaveForm.reset(); // Clear the form
                    } else {
                        showMessage(result.message || 'Failed to submit leave application. Please try again.', false);
                    }
                } catch (error) {
                    console.error('Error submitting leave application:', error);
                    showMessage('Network error. Please check your connection and try again.', false);
                } finally {
                    // Re-enable submit button
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Submit Application';
                }
            });

            // --- 3. INITIALIZE ---
            populateStudentInfo();
        });
    </script>
</body>
</html>
