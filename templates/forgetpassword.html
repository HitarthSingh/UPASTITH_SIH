<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Automated Attendance</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        :root {
            /* Theme Colors */
            --dark-blue: #02020a;
            --light-purple: #D8CCF2;
            --accent-purple-1: #8686AC;
            --accent-purple-2: #505081;
            --accent-purple-3: #272757;

            /* Original Dimensions */
            --logo-height: 200px;
            --nav-height: 105px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-blue);
            color: var(--light-purple);
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, var(--accent-purple-2), transparent 40%),
                radial-gradient(circle at 85% 30%, var(--accent-purple-3), transparent 40%),
                radial-gradient(circle at 50% 90%, var(--accent-purple-1), transparent 40%);
            filter: blur(120px);
            animation: subtleAurora 20s ease-in-out infinite alternate;
        }
        @keyframes subtleAurora {
            from { transform: scale(1) rotate(0deg); opacity: 0.7; }
            to { transform: scale(1.1) rotate(15deg); opacity: 0.9; }
        }

        /* Original Dimensions Styles */
        .logo-img {
            display: block;
            height: var(--logo-height);
            width: auto;
            object-fit: contain;
        }

        nav {
            height: var(--nav-height);
            min-height: var(--nav-height);
        }

        /* Glass card effect helper */
        .glass-card {
            background: rgba(39, 39, 87, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(134, 134, 172, 0.2);
        }

        /* Custom button style helper */
        .btn-custom {
            background-color: var(--accent-purple-1);
            color: var(--dark-blue);
            box-shadow: 0 4px 15px -5px rgba(134, 134, 172, 0.4);
        }

        /* Mobile menu styles */
        .mobile-menu {
            transform: translateX(100%);
            transition: transform 0.3s ease-in-out;
        }
        .mobile-menu.open {
            transform: translateX(0);
        }
    </style>
</head>
<body class="relative overflow-x-hidden">

    <header class="sticky top-4 z-50 mx-auto max-w-6xl">
        <nav class="glass-card rounded-2xl shadow-xl shadow-black/10 p-4 mx-4 flex items-center justify-between">
            <a href="/teacherloginpage" class="flex items-center flex-shrink-0 text-2xl font-bold">
                <svg class="h-12 w-12 mr-2 text-light-purple" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                Upastith
            </a>
            <div class="hidden md:flex items-center space-x-8">
                <a href="/#features" class="font-semibold opacity-80 hover:opacity-100 transition-opacity">Features</a>
                <a href="/aboutus" class="font-semibold opacity-80 hover:opacity-100 transition-opacity">About Us</a>
            </div>
            <a href="/" class="hidden md:block btn-custom py-2 px-5 rounded-full font-bold text-sm shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-transform duration-200">
                STUDENT LOGIN
            </a>
            <button id="mobile-menu-button" class="md:hidden text-2xl p-2 focus:outline-none">
                <i class="fas fa-bars"></i>
            </button>
        </nav>

        <div id="mobile-menu" class="mobile-menu glass-card fixed top-0 right-0 h-full w-64 z-[60] p-6 shadow-2xl md:hidden">
            <div class="flex justify-end mb-8">
                <button id="close-menu-button" class="text-2xl p-2 focus:outline-none">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <ul class="space-y-6 text-lg font-semibold text-center">
                <li><a href="/#features" class="block opacity-80 hover:opacity-100">Features</a></li>
                <li><a href="/aboutus" class="block opacity-80 hover:opacity-100">About Us</a></li>
                <li>
                    <a href="/" class="block btn-custom py-3 rounded-xl transition">Student Login</a>
                </li>
            </ul>
        </div>
    </header>

    <main>
        <!-- Section: Forgot Password Form -->
        <section class="min-h-[calc(100vh-var(--nav-height))] flex items-center justify-center p-5">
            <div class="w-full max-w-sm">
                
                <!-- The Glassmorphism Card -->
                <div class="glass-card rounded-2xl shadow-xl shadow-black/10 p-8">
                    <div class="mb-8 text-center">
                        <h2 class="text-2xl font-bold">Forgot Password?</h2>
                        <p class="opacity-70 text-sm mt-2">Enter your email and we'll send you a link to reset your password.</p>
                    </div>
                    
                    <form action="/forgot-password" method="POST" id="forgot-password-form" class="space-y-8">
                        
                        <!-- Floating Label Input for Email -->
                        <div class="relative">
                            <input type="email" id="email" name="email" class="block px-2.5 pb-2.5 pt-4 w-full text-sm text-[var(--light-purple)] bg-[rgba(39,39,87,0.5)] rounded-lg border-1 border-transparent appearance-none focus:outline-none focus:ring-0 focus:border-[var(--accent-purple-1)] peer" placeholder=" " required />
                            <label for="email" class="absolute text-sm text-[var(--light-purple)] opacity-70 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-transparent px-2 peer-focus:px-2 peer-focus:text-[var(--accent-purple-1)] peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 left-1">
                                <i class="fas fa-envelope mr-1"></i>
                                Email Address
                            </label>
                        </div>
    
                        <button type="submit" class="w-full btn-custom text-white py-3 rounded-xl font-bold text-base shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-transform duration-200">
                            SEND RESET LINK
                        </button>

                        <div class="text-center">
                            <a href="/teacherloginpage" class="text-sm font-medium opacity-70 hover:opacity-100 hover:text-[var(--accent-purple-1)] transition-colors">
                                <i class="fas fa-arrow-left mr-1"></i>
                                Back to Sign In
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <!-- Success Message Popup -->
    <div id="success-message" class="hidden fixed top-24 right-5 glass-card border-l-4 border-green-400 p-4 rounded-lg shadow-lg z-50 transition-transform duration-300 transform translate-x-full" role="alert">
        <div class="flex">
            <div class="py-1"><i class="fas fa-check-circle mr-3 text-lg text-green-400"></i></div>
            <div>
                <p class="font-bold">Success!</p>
                <p class="text-sm opacity-80">Password reset link sent to your email.</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Mobile menu logic
            const mobileMenuButton = document.getElementById('mobile-menu-button');
            const closeMenuButton = document.getElementById('close-menu-button');
            const mobileMenu = document.getElementById('mobile-menu');
            const navLinks = mobileMenu.querySelectorAll('a');

            mobileMenuButton.addEventListener('click', () => mobileMenu.classList.add('open'));
            closeMenuButton.addEventListener('click', () => mobileMenu.classList.remove('open'));
            navLinks.forEach(link => link.addEventListener('click', () => mobileMenu.classList.remove('open')));

            // Form logic
            const form = document.getElementById('forgot-password-form');
            const successMessage = document.getElementById('success-message');
            const emailInput = document.getElementById('email');

            form.addEventListener('submit', (event) => {
                // Prevent the default page reload on form submission
                event.preventDefault();

                const email = emailInput.value;

                // Basic validation to check if the email field is not empty
                if (email && email.includes('@')) {
                    // Show the success message with a slide-in animation
                    successMessage.classList.remove('hidden');
                    setTimeout(() => {
                        successMessage.classList.remove('translate-x-full');
                    }, 10);


                    // Clear the input field after showing the message
                    emailInput.value = '';

                    // Hide the message after 5 seconds with a slide-out animation
                    setTimeout(() => {
                         successMessage.classList.add('translate-x-full');
                         setTimeout(() => {
                             successMessage.classList.add('hidden');
                         }, 300); // Wait for animation to finish
                    }, 5000); 
                }
            });
        });
    </script>
</body>
</html>
