<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --dark-blue: #02020a;
            --light-purple: #D8CCF2;
            --accent-purple-1: #8686AC;
            --accent-purple-2: #505081;
            --accent-purple-3: #272757;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-blue);
            color: var(--light-purple);
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 15% 50%, var(--accent-purple-2), transparent 40%),
                radial-gradient(circle at 85% 30%, var(--accent-purple-3), transparent 40%),
                radial-gradient(circle at 50% 90%, var(--accent-purple-1), transparent 40%);
            filter: blur(120px);
            animation: subtleAurora 20s ease-in-out infinite alternate;
        }

        @keyframes subtleAurora {
            from {
                transform: scale(1) rotate(0deg);
                opacity: 0.7;
            }

            to {
                transform: scale(1.1) rotate(15deg);
                opacity: 0.9;
            }
        }

        .glass-card {
            background: rgba(39, 39, 87, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(134, 134, 172, 0.2);
        }

        /* Sidebar Styles */
        #sidebar {
            transition: width 0.3s ease-in-out;
        }

        #main-content {
            transition: margin-left 0.3s ease-in-out;
        }

        #sidebar.collapsed {
            width: 88px;
            /* w-22 */
        }

        #sidebar.collapsed .nav-text,
        #sidebar.collapsed #sidebar-header h1 {
            opacity: 0;
            visibility: hidden;
            width: 0;
            transition: opacity 0.1s, width 0.3s;
        }

        #sidebar.collapsed .nav-link svg {
            margin-right: 0;
        }

        #main-content.sidebar-collapsed {
            margin-left: 88px;
        }

        .nav-text,
        #sidebar-header h1 {
            transition: opacity 0.2s ease-in-out 0.1s, width 0.3s;
        }

        /* Mobile slide-in */
        @media (max-width: 1023px) {
            #sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease-in-out;
                z-index: 60;
                width: 256px !important;
                /* w-64 */
            }

            #sidebar.open {
                transform: translateX(0);
            }

            #main-content {
                margin-left: 0 !important;
            }
        }
    </style>
</head>

<body class="bg-[var(--dark-blue)]">
    <div class="relative flex min-h-screen">
        <!-- Collapsible Sidebar -->
        <aside id="sidebar" class="glass-card fixed top-0 left-0 z-50 flex h-full w-64 flex-col p-6">
            <!-- Desktop Collapse Button -->
            <button id="desktop-sidebar-toggle" class="absolute top-1/2 -right-4 z-10 hidden h-8 w-8 transform -translate-y-1/2 items-center justify-center rounded-full bg-[var(--accent-purple-2)] text-white transition-all hover:bg-[var(--accent-purple-1)] lg:flex">
                <svg id="desktop-toggle-icon" class="h-4 w-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
            </button>
            <div id="sidebar-header" class="mb-10 mt-4 overflow-hidden">
                <h1 class="whitespace-nowrap text-center text-2xl font-bold text-white">Student Portal</h1>
            </div>
            <nav class="w-full flex-grow">
                <ul class="space-y-2">
                    <li><a href="studentdashboard.html" class="nav-link flex items-center rounded-lg p-3 text-white/70 transition-colors hover:bg-white/10"><svg class="mr-3 h-5 w-5 flex-shrink-0 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h4"></path>
                            </svg><span class="nav-text whitespace-nowrap">Home</span></a></li>
                    <li><a href="timetable.html" class="nav-link flex items-center rounded-lg p-3 text-white/70 transition-colors hover:bg-white/10"><svg class="mr-3 h-5 w-5 flex-shrink-0 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg><span class="nav-text whitespace-nowrap">Timetable</span></a></li>
                    <li><a href="repository.html" class="nav-link flex items-center rounded-lg p-3 text-white/70 transition-colors hover:bg-white/10"><svg class="mr-3 h-5 w-5 flex-shrink-0 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v2a2 2 0 01-2 2m2-4v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4a2 2 0 012-2m2 4h10m-10 0v-2a2 2 0 012-2h6a2 2 0 012 2v2m-6-4h4"></path>
                            </svg><span class="nav-text whitespace-nowrap">Repository</span></a></li>
                    <li><a href="leaveapplication.html" class="nav-link flex items-center rounded-lg p-3 text-white/70 transition-colors hover:bg-white/10"><svg class="mr-3 h-5 w-5 flex-shrink-0 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg><span class="nav-text whitespace-nowrap">Leave Application</span></a></li>
                    <li><a href="studentresult.html" class="nav-link flex items-center rounded-lg bg-white/20 p-3 font-semibold text-white shadow-md"><svg class="mr-3 h-5 w-5 flex-shrink-0 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
                            </svg><span class="nav-text whitespace-nowrap">Student Result</span></a></li>
                    <li><a href="suggestionbox.html" class="nav-link flex items-center rounded-lg p-3 text-white/70 transition-colors hover:bg-white/10"><svg class="mr-3 h-5 w-5 flex-shrink-0 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 20.25h4.5m-15-2.25h15M12 16.5h4.5M3 13.5h18M12 9.75h4.5M3 6.75h18"></path>
                            </svg><span class="nav-text whitespace-nowrap">Suggestion Box</span></a></li>
                    <li><a href="#" onclick="handleLogout()" class="nav-link flex items-center rounded-lg p-3 text-white/70 transition-colors hover:bg-white/10 hover:text-red-300"><svg class="h-5 w-5 mr-3 flex-shrink-0 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg><span class="nav-text whitespace-nowrap">Logout</span></a></li>
                </ul>
            </nav>
        </aside>

        <!-- Mobile Sidebar Backdrop -->
        <div id="sidebar-backdrop" class="fixed inset-0 z-[59] hidden bg-black/50 lg:hidden"></div>

        <!-- Mobile Sidebar Toggle Button -->
        <button id="sidebar-toggle" class="glass-card fixed top-4 left-4 z-[61] rounded-md p-2 text-white lg:hidden">
             <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>

        <!-- Main Content Area -->
        <div id="main-content" class="flex-grow lg:ml-64">
            <main class="flex-grow p-4 pt-20 lg:p-8 lg:pt-8">
                <div class="mx-auto w-full max-w-4xl">
                    <!-- Header Section -->
                    <div class="glass-card mb-8 flex flex-col justify-between rounded-3xl p-6 shadow-xl md:flex-row md:items-start md:p-8">
                        <div>
                            <h1 class="text-3xl font-bold text-white lg:text-5xl">Student Result</h1>
                            <p class="mt-2 text-xl font-medium text-white/70 lg:text-2xl">Your academic performance.</p>
                        </div>
                        <div class="mt-4 flex items-center space-x-4 md:mt-0">
                            <div class="text-right">
                                <h3 id="student-name" class="text-lg font-medium text-white"></h3>
                                <p id="student-id" class="text-sm text-white/70"></p>
                            </div>
                            <div class="flex h-14 w-14 items-center justify-center rounded-full bg-[var(--accent-purple-1)] shadow-inner">
                                <span id="student-initial" class="text-2xl font-bold text-[var(--dark-blue)]"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Semester Selection Dropdown -->
                    <div class="mb-6">
                        <label for="semester-select" class="mb-2 block text-xl font-bold text-white">Select Semester</label>
                        <select id="semester-select" class="w-full rounded-lg border border-white/20 bg-black/20 p-3 text-white transition-all focus:outline-none focus:ring-2 focus:ring-[var(--accent-purple-1)]">
                            <option value="semester1">Semester 1</option>
                            <option value="semester2">Semester 2</option>
                            <option value="semester3">Semester 3</option>
                        </select>
                    </div>

                    <!-- Result Summary Section -->
                    <div class="glass-card mb-8 flex flex-col items-center rounded-3xl p-8 text-center shadow-xl">
                        <h2 class="mb-4 text-3xl font-bold text-white">Overall Score</h2>
                        <div class="relative h-40 w-40">
                            <svg class="h-full w-full" viewBox="0 0 100 100">
                                <circle class="text-white/20" stroke-width="10" stroke="currentColor" fill="transparent" r="40" cx="50" cy="50"></circle>
                                <circle id="score-circle" class="text-green-500" stroke-width="10" stroke-linecap="round" stroke="currentColor" fill="transparent" r="40" cx="50" cy="50" style="transform: rotate(-90deg); transform-origin: 50% 50%;"></circle>
                            </svg>
                            <span id="overall-score" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-4xl font-bold text-white">85%</span>
                        </div>
                        <p id="overall-message" class="mt-2 text-lg text-white/70">Well done! Keep up the great work.</p>
                    </div>

                    <!-- Detailed Results Table -->
                    <div class="glass-card rounded-3xl p-8 shadow-xl">
                        <h2 class="mb-6 text-3xl font-bold text-white">Subject-wise Results</h2>
                        <div class="overflow-x-auto">
                            <table class="min-w-full divide-y divide-white/20 overflow-hidden rounded-lg">
                                <thead class="bg-black/20">
                                    <tr>
                                        <th scope="col" class="px-6 py-4 text-left text-sm font-semibold uppercase tracking-wider text-white">Subject</th>
                                        <th scope="col" class="px-6 py-4 text-left text-sm font-semibold uppercase tracking-wider text-white">Grade</th>
                                        <th scope="col" class="px-6 py-4 text-left text-sm font-semibold uppercase tracking-wider text-white">Percentage</th>
                                    </tr>
                                </thead>
                                <tbody id="results-table-body" class="divide-y divide-white/10 bg-black/10">
                                    <!-- Table rows will be inserted here by JavaScript -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- 0. SESSION VALIDATION ---
            async function validateSession() {
                try {
                    const response = await fetch('/api/student/me', {
                        method: 'GET',
                        credentials: 'same-origin'
                    });
                    
                    if (!response.ok || response.status === 401) {
                        // Session is invalid, redirect to login
                        console.log('Session invalid, redirecting to login');
                        window.location.replace('/');
                        return false;
                    }
                    
                    const data = await response.json();
                    if (!data.success) {
                        // Session is invalid, redirect to login
                        console.log('Session invalid, redirecting to login');
                        window.location.replace('/');
                        return false;
                    }
                    
                    return true;
                } catch (error) {
                    console.error('Error validating session:', error);
                    // On error, redirect to login for security
                    window.location.replace('/');
                    return false;
                }
            }

            // Validate session before proceeding
            validateSession().then(isValid => {
                if (!isValid) return;
                
                // Continue with normal page initialization
                initializePage();
            });

            function initializePage() {
                // --- 0. NAVIGATION TOGGLE ---
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const mobileSidebarToggle = document.getElementById('sidebar-toggle');
            const desktopSidebarToggle = document.getElementById('desktop-sidebar-toggle');
            const desktopToggleIcon = document.getElementById('desktop-toggle-icon');
            const sidebarBackdrop = document.getElementById('sidebar-backdrop');
            
            const openMobileSidebar = () => {
                sidebar.classList.add('open');
                sidebarBackdrop.classList.remove('hidden');
            }

            const closeMobileSidebar = () => {
                sidebar.classList.remove('open');
                sidebarBackdrop.classList.add('hidden');
            }

            mobileSidebarToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                 if (sidebar.classList.contains('open')) {
                    closeMobileSidebar();
                } else {
                    openMobileSidebar();
                }
            });

            if (desktopSidebarToggle) {
                desktopSidebarToggle.addEventListener('click', () => {
                    sidebar.classList.toggle('collapsed');
                    mainContent.classList.toggle('sidebar-collapsed');
                    desktopToggleIcon.classList.toggle('rotate-180');
                });
            }
            
            sidebarBackdrop.addEventListener('click', closeMobileSidebar);

            // --- 1. MOCK DATA & INITIAL SETUP ---
            const studentData = {
                name: "Alex Williams",
                id: "67890",
                initial: "A"
            };

            const semestersData = {
                semester1: {
                    overallScore: 85,
                    message: 'Well done! Keep up the great work.',
                    subjects: [{
                        name: 'Mathematics',
                        grade: 'A+',
                        percentage: 92
                    }, {
                        name: 'Physics',
                        grade: 'A',
                        percentage: 88
                    }, {
                        name: 'History',
                        grade: 'B+',
                        percentage: 81
                    }, {
                        name: 'Chemistry',
                        grade: 'B',
                        percentage: 77
                    }, {
                        name: 'Literature',
                        grade: 'A-',
                        percentage: 85
                    }, ],
                },
                semester2: {
                    overallScore: 90,
                    message: 'Excellent job! Your hard work is paying off.',
                    subjects: [{
                        name: 'Mathematics',
                        grade: 'A+',
                        percentage: 95
                    }, {
                        name: 'Physics',
                        grade: 'A+',
                        percentage: 90
                    }, {
                        name: 'History',
                        grade: 'A-',
                        percentage: 86
                    }, {
                        name: 'Chemistry',
                        grade: 'A',
                        percentage: 89
                    }, {
                        name: 'Literature',
                        grade: 'A',
                        percentage: 91
                    }, ],
                },
                semester3: {
                    overallScore: 75,
                    message: 'Good effort. There is room for improvement.',
                    subjects: [{
                        name: 'Mathematics',
                        grade: 'B',
                        percentage: 78
                    }, {
                        name: 'Physics',
                        grade: 'C+',
                        percentage: 72
                    }, {
                        name: 'History',
                        grade: 'B-',
                        percentage: 75
                    }, {
                        name: 'Chemistry',
                        grade: 'B+',
                        percentage: 80
                    }, {
                        name: 'Literature',
                        grade: 'C+',
                        percentage: 74
                    }, ],
                },
            };

            const semesterSelect = document.getElementById('semester-select');
            const overallScoreEl = document.getElementById('overall-score');
            const overallMessageEl = document.getElementById('overall-message');
            const scoreCircleEl = document.getElementById('score-circle');
            const resultsTableBodyEl = document.getElementById('results-table-body');

            function populateStudentInfo() {
                document.getElementById('student-name').textContent = studentData.name;
                document.getElementById('student-id').textContent = `ID: ${studentData.id}`;
                document.getElementById('student-initial').textContent = studentData.initial;
            }

            function updateResults() {
                const selectedSemester = semesterSelect.value;
                const data = semestersData[selectedSemester];

                overallScoreEl.textContent = `${data.overallScore}%`;
                overallMessageEl.textContent = data.message;

                if (data.overallScore >= 85) {
                    scoreCircleEl.classList.remove('text-yellow-500', 'text-red-500');
                    scoreCircleEl.classList.add('text-green-500');
                } else if (data.overallScore >= 75) {
                    scoreCircleEl.classList.remove('text-green-500', 'text-red-500');
                    scoreCircleEl.classList.add('text-yellow-500');
                } else {
                    scoreCircleEl.classList.remove('text-green-500', 'text-yellow-500');
                    scoreCircleEl.classList.add('text-red-500');
                }

                const radius = 40;
                const circumference = 2 * Math.PI * radius;
                scoreCircleEl.style.strokeDasharray = circumference;
                const offset = circumference - (data.overallScore / 100) * circumference;
                scoreCircleEl.style.strokeDashoffset = offset;
                scoreCircleEl.style.transition = 'stroke-dashoffset 0.5s ease-out';


                resultsTableBodyEl.innerHTML = '';

                data.subjects.forEach(subject => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="whitespace-nowrap px-6 py-4 text-sm font-medium text-white">${subject.name}</td>
                        <td class="whitespace-nowrap px-6 py-4 text-sm text-white/70">${subject.grade}</td>
                        <td class="whitespace-nowrap px-6 py-4 text-sm text-white/70">${subject.percentage}%</td>
                    `;
                    resultsTableBodyEl.appendChild(row);
                });
            }

            semesterSelect.addEventListener('change', updateResults);

            // --- INITIALIZE ---
            populateStudentInfo();
            updateResults();
            } // End of initializePage function
        });

        // --- LOGOUT FUNCTIONALITY ---
        async function handleLogout() {
            // Show confirmation dialog
            if (confirm('Are you sure you want to logout?')) {
                try {
                    // Show loading state
                    const logoutButton = document.querySelector('a[onclick="handleLogout()"]');
                    if (logoutButton) {
                        const originalText = logoutButton.innerHTML;
                        logoutButton.innerHTML = '<svg class="h-5 w-5 mr-3 flex-shrink-0 transition-all animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" stroke-dasharray="32" stroke-dashoffset="32"><animate attributeName="stroke-dashoffset" dur="2s" values="32;0" repeatCount="indefinite"/></circle></svg><span class="nav-text whitespace-nowrap">Logging out...</span>';
                    }
                    
                    // Clear any stored client-side session data
                    localStorage.clear();
                    sessionStorage.clear();
                    
                    // Clear any cached data
                    if ('caches' in window) {
                        caches.keys().then(names => {
                            names.forEach(name => {
                                caches.delete(name);
                            });
                        });
                    }
                    
                    // Call logout API to end server-side session
                    const response = await fetch('/api/logout', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        credentials: 'same-origin' // Include session cookies
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        console.log('✅ Session terminated successfully:', result.message);
                    } else {
                        console.warn('⚠️ Logout API returned error:', result.message);
                    }
                    
                } catch (error) {
                    console.error('❌ Error during logout API call:', error);
                    // Continue with logout even if API call fails
                } finally {
                    // Force clear any remaining session data
                    document.cookie.split(";").forEach(function(c) { 
                        document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
                    });
                    
                    // Always redirect to main login dashboard regardless of API response
                    // Use replace to prevent back button from returning to dashboard
                    window.location.replace('/');
                }
            }
        }
    </script>
</body>

</html>
