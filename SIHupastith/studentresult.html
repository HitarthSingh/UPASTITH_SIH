<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result</title>
    <!-- Tailwind CSS for utility classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Importing a Google Font for a clean look */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom gradient background for the dashboard container */
        .gradient-bg {
            background-image: linear-gradient(135deg, #FFC0CB, #ADD8E6);
        }
    </style>
</head>
<body class="bg-gray-100 flex min-h-screen">

    <!-- Side Navigation Bar -->
    <div class="w-56 bg-white/30 shadow-lg p-6 flex flex-col items-center">
        <div class="mb-10 mt-4">
            <h1 class="text-2xl font-bold text-gray-800">Student Dashboard</h1>
        </div>
        <nav class="w-full">
            <ul class="space-y-2">
                <li>
                    <!-- Link to the Home page -->
                    <a href="index.html" class="flex items-center p-3 rounded-lg text-gray-600 hover:bg-gray-100/40 transition-colors">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h4"></path></svg>
                        Home
                    </a>
                </li>
                <li>
                    <!-- Link to the Timetable page -->
                    <a href="timetable.html" class="flex items-center p-3 rounded-lg text-gray-600 hover:bg-gray-100/40 transition-colors">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0h5a2 2 0 002-2v-6a2 2 0 012-2h2a2 2 0 012 2v6a2 2 0 01-2 2h-2m-7 0a2 2 0 01-2-2v-4a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2z"></path></svg>
                        Timetable
                    </a>
                </li>
                <li>
                    <!-- Link to the Repository page -->
                    <a href="repository.html" class="flex items-center p-3 rounded-lg text-gray-600 hover:bg-gray-100/40 transition-colors">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v2a2 2 0 01-2 2m2-4v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4a2 2 0 012-2m2 4h10m-10 0v-2a2 2 0 012-2h6a2 2 0 012 2v2m-6-4h4"></path></svg>
                        Repository
                    </a>
                </li>
                <li>
                    <!-- Link to the Leave Application page -->
                    <a href="leaveapplication.html" class="flex items-center p-3 rounded-lg text-gray-600 hover:bg-gray-100/40 transition-colors">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Leave Application
                    </a>
                </li>
                <li>
                    <!-- Active navigation link for Student Result -->
                    <a href="studentresult.html" class="flex items-center p-3 rounded-lg text-gray-800 font-semibold bg-gray-200/40 shadow-md">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                        Student Result
                    </a>
                </li>
                <li>
                    <!-- Placeholder link for Suggestion Box -->
                    <a href="suggestionbox.html" class="flex items-center p-3 rounded-lg text-gray-600 hover:bg-gray-100/40 transition-colors">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 20.25h4.5m-15-2.25h15M12 16.5h4.5M3 13.5h18M12 9.75h4.5M3 6.75h18"></path></svg>
                        Suggestion Box
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <!-- Main Content Area -->
    <div class="flex-grow flex items-center justify-center p-4">
        <!-- Main container with a gradient background -->
        <div class="w-full max-w-4xl rounded-3xl shadow-2xl p-8 lg:p-16 text-gray-800 gradient-bg">

            <!-- Header Section -->
            <div class="bg-white/40 rounded-3xl shadow-xl p-8 mb-10 flex justify-between items-start">
                <div>
                    <h1 class="text-5xl lg:text-6xl font-bold text-gray-800">Student Result</h1>
                    <p class="text-2xl lg:text-3xl mt-2 font-medium text-gray-600">Your academic performance.</p>
                </div>
                <!-- User profile section with initial and name -->
                <div class="flex flex-col items-center space-y-2">
                    <!-- Placeholder icon with the first letter of the name -->
                    <div class="w-12 h-12 bg-blue-400/50 rounded-full flex items-center justify-center shadow-inner">
                        <span class="text-2xl font-bold text-white">S</span>
                    </div>
                    <!-- Placeholder for the student's name -->
                    <div class="text-center">
                        <h3 class="font-medium text-lg text-gray-800">Student Name</h3>
                    </div>
                </div>
            </div>
            
            <!-- Semester Selection Dropdown -->
            <div class="mb-6">
                <label for="semester-select" class="block text-xl font-bold text-gray-800 mb-2">Select Semester</label>
                <select id="semester-select" class="w-full p-3 rounded-lg bg-white/70 border-none focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all">
                    <option value="semester1">Semester 1</option>
                    <option value="semester2">Semester 2</option>
                    <option value="semester3">Semester 3</option>
                </select>
            </div>

            <!-- Result Summary Section -->
            <div class="bg-white/40 rounded-3xl shadow-xl p-8 mb-8 flex flex-col items-center text-center">
                <h2 class="text-3xl font-bold mb-4">Overall Score</h2>
                <!-- Placeholder for a visual score display -->
                <div class="relative w-40 h-40">
                    <svg class="w-full h-full" viewBox="0 0 100 100">
                        <!-- Background circle for the progress bar -->
                        <circle class="text-gray-300" stroke-width="10" stroke="currentColor" fill="transparent" r="40" cx="50" cy="50"></circle>
                        <!-- Foreground circle for the progress bar (adjust stroke-dashoffset to change the value) -->
                        <circle id="score-circle" class="text-green-500" stroke-width="10" stroke="currentColor" fill="transparent" r="40" cx="50" cy="50"></circle>
                    </svg>
                    <span id="overall-score" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-4xl font-bold text-gray-800">85%</span>
                </div>
                <p id="overall-message" class="text-lg mt-2 text-gray-600">Well done! Keep up the great work.</p>
            </div>

            <!-- Detailed Results Table -->
            <div class="bg-white/40 rounded-3xl shadow-xl p-8">
                <h2 class="text-3xl font-bold mb-6">Subject-wise Results</h2>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-300 rounded-lg overflow-hidden">
                        <thead class="bg-white/50">
                            <tr>
                                <th scope="col" class="px-6 py-4 text-left text-sm font-semibold text-gray-800 uppercase tracking-wider">Subject</th>
                                <th scope="col" class="px-6 py-4 text-left text-sm font-semibold text-gray-800 uppercase tracking-wider">Grade</th>
                                <th scope="col" class="px-6 py-4 text-left text-sm font-semibold text-gray-800 uppercase tracking-wider">Percentage</th>
                            </tr>
                        </thead>
                        <tbody id="results-table-body" class="bg-white/60 divide-y divide-gray-200">
                            <!-- Table rows will be inserted here by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data for each semester
        const semestersData = {
            semester1: {
                overallScore: 85,
                message: 'Well done! Keep up the great work.',
                subjects: [
                    { name: 'Mathematics', grade: 'A+', percentage: 92 },
                    { name: 'Physics', grade: 'A', percentage: 88 },
                    { name: 'History', grade: 'B+', percentage: 81 },
                    { name: 'Chemistry', grade: 'B', percentage: 77 },
                    { name: 'Literature', grade: 'A-', percentage: 85 },
                ],
            },
            semester2: {
                overallScore: 90,
                message: 'Excellent job! Your hard work is paying off.',
                subjects: [
                    { name: 'Mathematics', grade: 'A+', percentage: 95 },
                    { name: 'Physics', grade: 'A+', percentage: 90 },
                    { name: 'History', grade: 'A-', percentage: 86 },
                    { name: 'Chemistry', grade: 'A', percentage: 89 },
                    { name: 'Literature', grade: 'A', percentage: 91 },
                ],
            },
            semester3: {
                overallScore: 75,
                message: 'Good effort. There is room for improvement.',
                subjects: [
                    { name: 'Mathematics', grade: 'B', percentage: 78 },
                    { name: 'Physics', grade: 'C+', percentage: 72 },
                    { name: 'History', grade: 'B-', percentage: 75 },
                    { name: 'Chemistry', grade: 'B+', percentage: 80 },
                    { name: 'Literature', grade: 'C+', percentage: 74 },
                ],
            },
        };

        // Get DOM elements
        const semesterSelect = document.getElementById('semester-select');
        const overallScoreEl = document.getElementById('overall-score');
        const overallMessageEl = document.getElementById('overall-message');
        const scoreCircleEl = document.getElementById('score-circle');
        const resultsTableBodyEl = document.getElementById('results-table-body');

        // Function to update the results based on the selected semester
        function updateResults() {
            // Get the selected semester ID from the dropdown
            const selectedSemester = semesterSelect.value;
            // Get the data for the selected semester
            const data = semestersData[selectedSemester];

            // Update the overall score and message
            overallScoreEl.textContent = `${data.overallScore}%`;
            overallMessageEl.textContent = data.message;

            // Calculate and set the progress bar (stroke-dashoffset)
            const circumference = 251.2; // 2 * pi * 40
            const offset = circumference - (data.overallScore / 100) * circumference;
            scoreCircleEl.style.strokeDashoffset = offset;

            // Clear the existing table rows
            resultsTableBodyEl.innerHTML = '';

            // Add the new subject results to the table
            data.subjects.forEach(subject => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${subject.name}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${subject.grade}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${subject.percentage}%</td>
                `;
                resultsTableBodyEl.appendChild(row);
            });
        }

        // Add an event listener to the dropdown to trigger updates on change
        semesterSelect.addEventListener('change', updateResults);

        // Call the function initially to load the data for the first semester
        updateResults();
    </script>
</body>
</html>
