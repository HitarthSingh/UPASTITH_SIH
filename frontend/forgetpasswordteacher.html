<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Automated Attendance</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
         :root {
            --logo-height: 200px; /* Adjust this for logo height */
            --nav-height: 105px; /* Adjust this for nav background height */
        }

        .logo-img {
            display: block;
            height: var(--logo-height);
            width: auto;
            object-fit: contain;
        }

        nav {
            height: var(--nav-height);
            min-height: var(--nav-height);
        }

        body {
            font-family: 'Poppins', sans-serif;
        }

        body::before {
            content: '';
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            
            background: 
                radial-gradient(circle at 15% 50%, #89cff0, transparent 40%),
                radial-gradient(circle at 85% 30%, #ffafcc, transparent 40%),
                radial-gradient(circle at 50% 90%, #b39ddb, transparent 40%);

            filter: blur(120px);
        }
    </style>
</head>
<body class="relative overflow-x-hidden bg-blue-50 text-gray-800">

    <header class="sticky top-4 z-50 mx-auto max-w-6xl">
        <nav class="bg-white/15 backdrop-blur-lg rounded-2xl border border-white/20 shadow-xl shadow-black/10 p-4 mx-4 flex items-center justify-between">
             <a href="teacher_login.html">
                <img src="Untitled_design-removebg-preview.png" alt="Logo" class="logo-img">
            </a>
            <a href="landingpagefinal1.html" class="bg-black text-white py-2 px-5 rounded-full font-bold text-sm shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-transform duration-200">
                STUDENT LOGIN
            </a>
        </nav>
    </header>

    <main>
        <!-- Section: Forgot Password Form -->
        <section class="min-h-[calc(100vh-var(--nav-height))] flex items-center justify-center p-5">
            <div class="w-full max-w-sm">
                
                <!-- The Glassmorphism Card -->
                <div class="bg-white/15 backdrop-blur-lg rounded-2xl border border-white/20 shadow-xl shadow-black/10 p-8">
                    <div class="mb-8 text-center">
                         <h2 class="text-2xl font-bold text-gray-800">Forgot Password?</h2>
                         <p class="text-gray-600 text-sm mt-2">Enter your email and we'll send you a link to reset your password.</p>
                    </div>
                    
                    <form action="/forgot-password" method="POST" id="forgot-password-form" class="space-y-8">
                        
                        <!-- Floating Label Input for Email -->
                        <div class="relative">
                            <input type="email" id="email" name="email" class="block px-2.5 pb-2.5 pt-4 w-full text-sm text-gray-900 bg-white/30 rounded-lg border-1 border-transparent appearance-none focus:outline-none focus:ring-0 focus:border-[#f06292] peer" placeholder=" " required />
                            <label for="email" class="absolute text-sm text-gray-600 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-transparent px-2 peer-focus:px-2 peer-focus:text-[#f06292] peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 left-1">
                                <i class="fas fa-envelope mr-1"></i>
                                Email Address
                            </label>
                        </div>
    
                        <button type="submit" class="w-full bg-black text-white py-3 rounded-xl font-bold text-base shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-transform duration-200">
                            SEND RESET LINK
                        </button>

                        <div class="text-center">
                            <a href="teacherloginpage.html" class="text-sm font-medium text-gray-700 hover:text-[#f06292] transition-colors">
                                <i class="fas fa-arrow-left mr-1"></i>
                                Back to Sign In
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <!-- Success Message Popup -->
    <div id="success-message" class="hidden fixed top-24 right-5 bg-green-100 border-l-4 border-green-500 text-green-700 p-4 rounded-lg shadow-lg z-50 transition-transform duration-300 transform translate-x-full" role="alert">
        <div class="flex">
            <div class="py-1"><i class="fas fa-check-circle mr-3 text-lg"></i></div>
            <div>
                <p class="font-bold">Success!</p>
                <p class="text-sm">Password reset link sent to your email.</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('forgot-password-form');
            const successMessage = document.getElementById('success-message');
            const emailInput = document.getElementById('email');

            form.addEventListener('submit', (event) => {
                // Prevent the default page reload on form submission
                event.preventDefault();

                const email = emailInput.value;

                // Basic validation to check if the email field is not empty
                if (email && email.includes('@')) {
                    // Show the success message with a slide-in animation
                    successMessage.classList.remove('hidden');
                    setTimeout(() => {
                        successMessage.classList.remove('translate-x-full');
                    }, 10);


                    // Clear the input field after showing the message
                    emailInput.value = '';

                    // Hide the message after 5 seconds with a slide-out animation
                    setTimeout(() => {
                         successMessage.classList.add('translate-x-full');
                         setTimeout(() => {
                            successMessage.classList.add('hidden');
                         }, 300); // Wait for animation to finish
                    }, 5000); 
                }
            });
        });
    </script>
</body>
</html>
