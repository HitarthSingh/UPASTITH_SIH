<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Attendance - Teacher Login</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        :root {
            --logo-height: 200px; /* Adjust this for logo height */
            --nav-height: 105px; /* Adjust this for nav background height */
        }

        .logo-img {
            display: block;
            height: var(--logo-height);
            width: auto;
            object-fit: contain;
        }

        nav {
            height: var(--nav-height);
            min-height: var(--nav-height);
        }

        body {
            font-family: 'Poppins', sans-serif;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 15% 50%, #89cff0, transparent 40%),
                radial-gradient(circle at 85% 30%, #ffafcc, transparent 40%),
                radial-gradient(circle at 50% 90%, #b39ddb, transparent 40%);
            filter: blur(120px);
        }
    </style>
</head>

<body class="relative overflow-x-hidden bg-blue-50 text-gray-800">

    <header class="sticky top-4 z-50 mx-auto max-w-6xl">
        <nav
            class="bg-white/15 backdrop-blur-lg rounded-2xl border border-white/20 shadow-xl shadow-black/10 p-4 mx-4 flex items-center justify-between">
            <a href="#">
                <img src="Untitled_design-removebg-preview.png" alt="Logo" class="logo-img">
            </a>
            <a href="landingpagefinal1.html"
                class="bg-black text-white py-2 px-5 rounded-full font-bold text-sm shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-transform duration-200">
                STUDENT LOGIN
            </a>
        </nav>
    </header>

    <main>
        <section class="min-h-[calc(100vh-var(--nav-height))] flex items-center justify-center p-5">
            <div class="w-full max-w-sm">
                <div
                    class="bg-white/15 backdrop-blur-lg rounded-2xl border border-white/20 shadow-xl shadow-black/10 p-8">
                    <div class="mb-8 text-center">
                        <h2 class="text-2xl font-bold text-gray-800">Welcome Back!</h2>
                        <p class="text-gray-600">Please sign in to your dashboard.</p>
                    </div>

                    <form action="/login/teacher" method="POST" id="teacher-login-form"
                        class="space-y-8">

                        <div class="relative">
                            <input type="text" id="teacher_id" name="teacher_id"
                                class="block px-2.5 pb-2.5 pt-4 w-full text-sm text-gray-900 bg-white/30 rounded-lg border-1 border-transparent appearance-none focus:outline-none focus:ring-0 focus:border-[#f06292] peer"
                                placeholder=" " required />
                            <label for="teacher_id"
                                class="absolute text-sm text-gray-600 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-transparent px-2 peer-focus:px-2 peer-focus:text-[#f06292] peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 left-1">
                                <i class="fas fa-user-tie mr-1"></i>
                                Teacher ID
                            </label>
                        </div>

                        <div class="relative">
                            <input type="password" id="password" name="password"
                                class="block px-2.5 pb-2.5 pt-4 w-full text-sm text-gray-900 bg-white/30 rounded-lg border-1 border-transparent appearance-none focus:outline-none focus:ring-0 focus:border-[#f06292] peer"
                                placeholder=" " required />
                            <label for="password"
                                class="absolute text-sm text-gray-600 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-transparent px-2 peer-focus:px-2 peer-focus:text-[#f06292] peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 left-1">
                                <i class="fas fa-key mr-1"></i>
                                Password
                            </label>
                        </div>

                        <div class="text-right -mt-4">
                            <a href="forgetpasswordteacher.html"
                                class="text-xs font-medium text-gray-700 hover:text-[#f06292] transition-colors">Forgot
                                Password?</a>
                        </div>

                        <button type="submit"
                            class="w-full bg-black text-white py-3 rounded-xl font-bold text-base shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-transform duration-200">
                            SIGN IN
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
