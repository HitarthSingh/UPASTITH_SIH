<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Timetable</title>
    <!-- Tailwind CSS for utility classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Importing a Google Font for a clean look */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom gradient background for the dashboard container */
        .gradient-bg {
            background-image: linear-gradient(135deg, #FFC0CB, #ADD8E6);
        }
        /* Styles for the QR scanner modal overlay */
        .qr-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
    </style>
</head>
<body class="bg-gray-100 flex min-h-screen">

    <!-- Side Navigation Bar -->
    <div class="w-56 bg-white/30 shadow-lg p-6 flex flex-col items-center">
        <div class="mb-10 mt-4">
            <h1 class="text-2xl font-bold text-gray-800">Student Dashboard</h1>
        </div>
        <nav class="w-full">
            <ul class="space-y-2">
                <li>
                    <!-- Link to the Home page -->
                    <a href="studentdashboard.html" class="flex items-center p-3 rounded-lg text-gray-600 hover:bg-gray-100/40 transition-colors">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h4"></path></svg>
                        Home
                    </a>
                </li>
                <li>
                    <!-- Active navigation link for the Timetable page -->
                    <a href="timetable.html" class="flex items-center p-3 rounded-lg text-gray-800 font-semibold bg-gray-200/40 shadow-md">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0h5a2 2 0 002-2v-6a2 2 0 012-2h2a2 2 0 012 2v6a2 2 0 01-2 2h-2m-7 0a2 2 0 01-2-2v-4a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2z"></path></svg>
                        Timetable
                    </a>
                </li>
                <li>
                    <!-- Placeholder link for Repository -->
                    <a href="repository.html" class="flex items-center p-3 rounded-lg text-gray-600 hover:bg-gray-100/40 transition-colors">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v2a2 2 0 01-2 2m2-4v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4a2 2 0 012-2m2 4h10m-10 0v-2a2 2 0 012-2h6a2 2 0 012 2v2m-6-4h4"></path></svg>
                        Repository
                    </a>
                </li>
                <li>
                    <!-- Placeholder link for Leave Application -->
                    <a href="leaveapplication.html" class="flex items-center p-3 rounded-lg text-gray-600 hover:bg-gray-100/40 transition-colors">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        Leave Application
                    </a>
                </li>
                <li>
                    <!-- Placeholder link for Student Result -->
                    <a href="studentresult.html" class="flex items-center p-3 rounded-lg text-gray-600 hover:bg-gray-100/40 transition-colors">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                        Student Result
                    </a>
                </li>
                <li>
                    <!-- Placeholder link for Suggestion Box -->
                    <a href="suggestionbox.html" class="flex items-center p-3 rounded-lg text-gray-600 hover:bg-gray-100/40 transition-colors">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 20.25h4.5m-15-2.25h15M12 16.5h4.5M3 13.5h18M12 9.75h4.5M3 6.75h18"></path></svg>
                        Suggestion Box
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <!-- Main Content Area -->
    <div class="flex-grow flex items-center justify-center p-4">
        <!-- Main timetable container with a gradient background -->
        <div class="w-full max-w-6xl rounded-3xl shadow-2xl p-8 lg:p-16 text-gray-800 gradient-bg">

            <!-- Header Section -->
            <div class="bg-white/40 rounded-3xl shadow-xl p-8 mb-10 flex justify-between items-start">
                <div>
                    <h1 class="text-5xl lg:text-6xl font-bold text-gray-800">Monthly Timetable</h1>
                    <p class="text-2xl lg:text-3xl mt-2 font-medium text-gray-600">Plan your month ahead.</p>
                </div>
                <!-- User profile section with initial and name -->
                <div class="flex flex-col items-center space-y-2">
                    <!-- Placeholder icon with the first letter of the name -->
                    <div class="w-12 h-12 bg-blue-400/50 rounded-full flex items-center justify-center shadow-inner">
                        <span class="text-2xl font-bold text-white">S</span>
                    </div>
                    <!-- Placeholder for the student's name -->
                    <div class="text-center">
                        <h3 class="font-medium text-lg text-gray-800">Student Name</h3>
                    </div>
                </div>
            </div>

            <!-- Timetable Section (Monthly Calendar) -->
            <div class="bg-white/40 rounded-3xl shadow-xl p-8">
                <!-- Calendar header with month and navigation buttons -->
                <div class="flex justify-between items-center mb-6">
                    <button onclick="changeMonth(-1)" class="p-2 rounded-full hover:bg-gray-200/40 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <h2 id="current-month-year" class="text-2xl font-semibold"></h2>
                    <button onclick="changeMonth(1)" class="p-2 rounded-full hover:bg-gray-200/40 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>
                
                <!-- Weekday headers -->
                <div class="grid grid-cols-7 gap-4 text-center font-medium text-gray-600 mb-4">
                    <span>Sun</span>
                    <span>Mon</span>
                    <span>Tue</span>
                    <span>Wed</span>
                    <span>Thu</span>
                    <span>Fri</span>
                    <span>Sat</span>
                </div>

                <!-- Calendar grid for days -->
                <div id="calendar-grid" class="grid grid-cols-7 gap-4">
                    <!-- Calendar days will be generated here by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- QR Code Scanner Modal -->
    <div id="qr-scanner-modal" class="qr-modal-overlay hidden">
        <div class="bg-white rounded-3xl p-8 shadow-2xl relative w-full max-w-lg mx-4">
            <!-- Button to close the modal -->
            <button onclick="closeScanner()" class="absolute top-4 right-4 p-2 rounded-full text-gray-400 hover:bg-gray-200 hover:text-gray-600 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            <h2 class="text-2xl font-semibold mb-6 text-center">Scan QR Code</h2>
            <!-- Video element to display camera stream -->
            <video id="video-stream" class="w-full rounded-lg" autoplay playsinline></video>
            <p id="camera-status" class="mt-4 text-center text-gray-500"></p>
        </div>
    </div>

    <script>
        // Initializing the current date for the calendar
        let currentDate = new Date();

        const monthYearEl = document.getElementById('current-month-year');
        const calendarGrid = document.getElementById('calendar-grid');

        // Function to render the calendar for a given month and year
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            // Getting the first day of the month (0=Sun, 1=Mon, ...)
            const firstDay = new Date(year, month, 1).getDay();
            // Getting the number of days in the current month
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // Setting the month and year text
            monthYearEl.textContent = currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });
            calendarGrid.innerHTML = '';

            // Adding blank days for the preceding month to align the first day
            for (let i = 0; i < firstDay; i++) {
                const blankDay = document.createElement('div');
                // The 'h-28' class ensures that empty cells have the same height as filled ones.
                blankDay.className = 'h-28';
                calendarGrid.appendChild(blankDay);
            }

            // Adding the days of the current month
            for (let i = 1; i <= daysInMonth; i++) {
                // The 'group' class allows child elements to be styled on parent hover
                // The 'h-28' and 'w-full' classes ensure all day boxes have a consistent size.
                const dayEl = document.createElement('div');
                dayEl.className = 'group p-2 rounded-lg bg-gray-50/40 shadow-sm flex flex-col items-center text-center transition-colors hover:bg-gray-100/50 h-28 w-full';
                dayEl.innerHTML = `<span class="font-bold text-lg">${i}</span>`;
                
                // Example of adding events to specific days
                if (i === 10) {
                    // The 'opacity-0' class hides the subject by default.
                    // 'group-hover:opacity-100' shows it on hover.
                    dayEl.innerHTML += `
                        <div class="mt-2 text-xs opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                            <div class="bg-blue-200/40 text-blue-800 px-2 py-1 rounded-full font-medium mb-1">
                                Calculus
                                <button onclick="scanQRCode()" class="ml-1 text-blue-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.5v15m7.5-7.5h-15M12 4.5v15m7.5-7.5h-15M17.25 7.5h.008v.008h-.008V7.5zm-7.5 0h.008v.008h-.008V7.5zm7.5 7.5h.008v.008h-.008v-.008zm-7.5 0h.008v.008h-.008v-.008zm-3-4.5h.008v.008h-.008v-.008zM12 12h.008v.008H12V12z"/></svg>
                                </button>
                            </div>
                        </div>
                    `;
                }
                
                if (i === 22) {
                    dayEl.innerHTML += `
                        <div class="mt-2 text-xs opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                            <div class="bg-purple-200/40 text-purple-800 px-2 py-1 rounded-full font-medium mb-1">
                                Chemistry
                                <button onclick="scanQRCode()" class="ml-1 text-purple-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.5v15m7.5-7.5h-15M12 4.5v15m7.5-7.5h-15M17.25 7.5h.008v.008h-.008V7.5zm-7.5 0h.008v.008h-.008V7.5zm7.5 7.5h.008v.008h-.008v-.008zm-7.5 0h.008v.008h-.008v-.008zm-3-4.5h.008v.008h-.008v-.008zM12 12h.008v.008H12V12z"/></svg>
                                </button>
                            </div>
                            <div class="bg-pink-200/40 text-pink-800 px-2 py-1 rounded-full font-medium">
                                History
                                <button onclick="scanQRCode()" class="ml-1 text-pink-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.5v15m7.5-7.5h-15M12 4.5v15m7.5-7.5h-15M17.25 7.5h.008v.008h-.008V7.5zm-7.5 0h.008v.008h-.008V7.5zm7.5 7.5h.008v.008h-.008v-.008zm-7.5 0h.008v.008h-.008v-.008zm-3-4.5h.008v.008h-.008v-.008zM12 12h.008v.008H12V12z"/></svg>
                                </button>
                            </div>
                        </div>
                    `;
                }

                calendarGrid.appendChild(dayEl);
            }
        }

        // Function to change the month and re-render the calendar
        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
        }

        // Initial render of the calendar
        renderCalendar();
        
        // QR Code Scanner Logic
        const qrModal = document.getElementById('qr-scanner-modal');
        const videoStream = document.getElementById('video-stream');
        const cameraStatus = document.getElementById('camera-status');
        let stream;

        // Function to open the QR scanner modal and request camera access
        async function scanQRCode() {
            qrModal.classList.remove('hidden');
            cameraStatus.textContent = "Requesting camera access...";

            try {
                // Get access to the camera
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                videoStream.srcObject = stream;
                cameraStatus.textContent = "Camera is live. Point at a QR code.";

            } catch (err) {
                console.error("Error accessing camera:", err);
                cameraStatus.textContent = "Error: Could not access camera. Please check your permissions.";
            }
        }

        // Function to close the QR scanner modal and stop the camera stream
        function closeScanner() {
            qrModal.classList.add('hidden');
            // Stop all tracks in the stream
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            videoStream.srcObject = null;
        }
    </script>
</body>
</html>
